<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Дневник дня Яна</title>
  <style>
    body{font-family:Inter,system-ui,Arial,sans-serif;background:#f5f7fb;color:#111;margin:0}
    .wrap{max-width:900px;margin:24px auto;padding:0 14px}
    .card{background:#fff;border:1px solid #dbe4f0;border-radius:14px;padding:16px;margin-bottom:12px}
    h1,h2{margin:.2em 0}
    .muted{color:#5b6470}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#e8f1ff;color:#1d4ed8;font-size:12px;font-weight:700}
    ul{line-height:1.5}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Онлайн-дневник дня Яна</h1>
      <div class="muted">Короткие отметки по режиму дня: сон, пробуждение, самочувствие, питание, активность.</div>
      <p><span class="pill">Старт: 18.03.2026</span></p>
    </section>

    <section class="card">
      <h2>Запись #1 — 18.03.2026</h2>
      <ul>
        <li><b>Пробуждение:</b> 07:20 (утро).</li>
        <li><b>Комментарий:</b> первая запись в дневнике создана.</li>
      </ul>
    </section>
  </div>
</body>
</html>
